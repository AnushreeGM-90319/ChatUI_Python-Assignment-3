<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buddy Chat UI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

  <div class="sidebar" id="sidebar">
    <button class="new-chat">+ New Chat</button>
    <div class="history" id="history"></div>
  </div>

  <div class="chat-container">

    <div class="top-bar">
      <button id="menuBtn"><i class="fa fa-bars"></i></button>
      <h5>Buddy 🤖</h5>
      <button id="darkToggle"><i class="fa fa-moon"></i></button>
    </div>

    <div class="welcome" id="welcome">
      <h1>👋 Hello, Buddy here</h1>
      <p>How can I help you today?</p>

      <div class="chips">
        <span class="chip">Explain AI</span>
        <span class="chip">Write Code</span>
        <span class="chip">Give Ideas</span>
        <span class="chip">Help Study</span>
      </div>
    </div>

    <div id="messages" class="messages"></div>

    <div id="typing" class="typing">
      <span></span><span></span><span></span>
    </div>

    <div class="input-area">
      <textarea id="input" rows="1" placeholder="Message Buddy..."></textarea>
      <button id="sendBtn" disabled>
        <i class="fa fa-paper-plane"></i>
      </button>
    </div>

  </div>
</div>

<script src="js/chat.js"></script>
</body>
</html>
